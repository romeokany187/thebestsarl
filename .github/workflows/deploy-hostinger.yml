name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

env:
  HOSTINGER_HOST: 82.29.194.219
  HOSTINGER_PORT: 65002
  HOSTINGER_USER: u697417861
  HOSTINGER_APP_DIR: /home/u697417861/domains/thebestsarlworkspace.com/nodejs
  HOSTINGER_BUNDLE_DIR: /home/u697417861/domains/thebestsarlworkspace.com/.deploy
  PRISMA_SCHEMA_FILE: prisma/schema.mysql.prisma

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production app
        run: npm run build:mysql

      - name: Create deployment bundle
        run: |
          rm -rf .deploy
          mkdir -p .deploy/app
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env*' \
            --exclude='imports' \
            --exclude='coverage' \
            ./ .deploy/app/
          tar -czf .deploy/thebestsarl-hostinger.tar.gz -C .deploy/app .

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Upload bundle to Hostinger
        env:
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
          HOSTINGER_ENV: ${{ secrets.HOSTINGER_ENV }}
        run: |
          if [ -z "$HOSTINGER_PASSWORD" ]; then
            echo "[deploy] ERREUR: Secret GitHub HOSTINGER_PASSWORD manquant ou vide."
            echo "[deploy] Va dans Settings > Secrets and variables > Actions puis ajoute HOSTINGER_PASSWORD."
            exit 1
          fi
          sshpass -p "$HOSTINGER_PASSWORD" ssh -o StrictHostKeyChecking=no -p "$HOSTINGER_PORT" "$HOSTINGER_USER@$HOSTINGER_HOST" "mkdir -p '$HOSTINGER_BUNDLE_DIR' '$HOSTINGER_APP_DIR'"
          sshpass -p "$HOSTINGER_PASSWORD" scp -P "$HOSTINGER_PORT" -o StrictHostKeyChecking=no .deploy/thebestsarl-hostinger.tar.gz "$HOSTINGER_USER@$HOSTINGER_HOST:$HOSTINGER_BUNDLE_DIR/"
          # Toujours synchroniser le .env depuis HOSTINGER_ENV si defini
          if [ -n "$HOSTINGER_ENV" ]; then
            printf '%s' "$HOSTINGER_ENV" | sshpass -p "$HOSTINGER_PASSWORD" ssh -o StrictHostKeyChecking=no -p "$HOSTINGER_PORT" "$HOSTINGER_USER@$HOSTINGER_HOST" "cat > '$HOSTINGER_APP_DIR/.env'"
            echo "[deploy] .env synchronise depuis HOSTINGER_ENV."
          else
            echo "[deploy] INFO: HOSTINGER_ENV absent, .env conserve tel quel sur le serveur."
          fi

      - name: Extract bundle and restart app
        env:
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
        run: |
          if [ -z "$HOSTINGER_PASSWORD" ]; then
            echo "[deploy] ERREUR: Secret GitHub HOSTINGER_PASSWORD manquant ou vide."
            exit 1
          fi
          sshpass -p "$HOSTINGER_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -p "$HOSTINGER_PORT" "$HOSTINGER_USER@$HOSTINGER_HOST" '
            set -e
            APP_DIR="'$HOSTINGER_APP_DIR'"
            BUNDLE_DIR="'$HOSTINGER_BUNDLE_DIR'"
            BUNDLE="$BUNDLE_DIR/thebestsarl-hostinger.tar.gz"

            ensure_restart() {
              mkdir -p "$APP_DIR/tmp"
              touch "$APP_DIR/tmp/restart.txt" || true
            }
            trap ensure_restart EXIT

            # Session SSH non interactive: reconstruire PATH pour retrouver node/npm
            for candidate in "$HOME/.nvm/versions/node"/*/bin \
              /opt/alt/alt-nodejs20/root/usr/bin \
              /opt/alt/alt-nodejs18/root/usr/bin \
              /opt/alt/alt-nodejs16/root/usr/bin \
              /usr/local/bin \
              /usr/bin; do
              if [ -d "$candidate" ]; then
                PATH="$candidate:$PATH"
              fi
            done
            export PATH

            if [ -s "$HOME/.nvm/nvm.sh" ]; then
              . "$HOME/.nvm/nvm.sh"
              nvm use --lts >/dev/null 2>&1 || true
            fi

            if ! command -v node >/dev/null 2>&1 && command -v nodejs >/dev/null 2>&1; then
              NODE_CMD="nodejs"
            else
              NODE_CMD="node"
            fi

            if ! command -v "$NODE_CMD" >/dev/null 2>&1; then
              echo "[deploy] ERREUR: Node.js introuvable dans la session SSH Hostinger."
              exit 1
            fi

            if ! command -v npm >/dev/null 2>&1; then
              echo "[deploy] ERREUR: npm introuvable dans la session SSH Hostinger."
              exit 1
            fi

            mkdir -p "$APP_DIR" "$BUNDLE_DIR"
            find "$APP_DIR" -mindepth 1 -maxdepth 1 ! -name tmp ! -name .env -exec rm -rf {} +
            tar -xzf "$BUNDLE" -C "$APP_DIR"
            cd "$APP_DIR"

            # Charger DATABASE_URL/DIRECT_URL avant toute commande Prisma
            if [ -f "$APP_DIR/.env" ]; then
              set -a && source "$APP_DIR/.env" && set +a
              echo "[deploy] Variables chargees depuis $APP_DIR/.env"
            elif [ -n "$DATABASE_URL" ]; then
              echo "[deploy] DATABASE_URL deja disponible via environnement Hostinger"
            else
              echo "[deploy] ERREUR: DATABASE_URL introuvable (.env absent et non defini par hPanel)"
              exit 1
            fi

            if [ -z "$DIRECT_URL" ] && [ -n "$DATABASE_URL" ]; then
              DIRECT_URL="$DATABASE_URL"
              export DIRECT_URL
              echo "[deploy] INFO: DIRECT_URL absent, fallback sur DATABASE_URL"
            fi

            if [ -z "$DIRECT_URL" ]; then
              echo "[deploy] ERREUR: DIRECT_URL introuvable pour Prisma"
              exit 1
            fi

            ensure_restart
          '

      - name: Run database migrations
        env:
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
        run: |
          do_ssh() {
            sshpass -p "$HOSTINGER_PASSWORD" ssh \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=20 \
              -p "$HOSTINGER_PORT" "$HOSTINGER_USER@$HOSTINGER_HOST" "$@"
          }

          APP_DIR="$HOSTINGER_APP_DIR"
          SETUP_PATH='for c in "$HOME/.nvm/versions/node"/*/bin /opt/alt/alt-nodejs20/root/usr/bin /opt/alt/alt-nodejs18/root/usr/bin /usr/local/bin /usr/bin; do [ -d "$c" ] && PATH="$c:$PATH"; done; export PATH; [ -s "$HOME/.nvm/nvm.sh" ] && . "$HOME/.nvm/nvm.sh" && nvm use --lts >/dev/null 2>&1 || true'
          LOAD_ENV="[ -f '$APP_DIR/.env' ] && set -a && . '$APP_DIR/.env' && set +a; [ -z \"\$DIRECT_URL\" ] && [ -n \"\$DATABASE_URL\" ] && export DIRECT_URL=\"\$DATABASE_URL\""

          do_ssh "$SETUP_PATH; cd '$APP_DIR'; $LOAD_ENV; npm exec -- prisma db push --schema prisma/schema.mysql.prisma --accept-data-loss || echo '[deploy] WARNING: echec prisma db push (non bloquant).'"

          do_ssh "$SETUP_PATH; cd '$APP_DIR'; $LOAD_ENV; \
            npm run db:ensure:password-setup-table || echo '[deploy] WARNING: echec ensure password setup table (non bloquant).'; \
            npm run db:allow:pnr-duplicates || echo '[deploy] WARNING: echec allow pnr duplicates (non bloquant).'; \
            npm run db:reset:airline-deposits || echo '[deploy] WARNING: echec reset airline deposits (non bloquant).'; \
            npm run db:seed:attendance:random || echo '[deploy] WARNING: echec seed attendance (non bloquant).'; \
            npm run db:send:unpaid-monthly-digest || echo '[deploy] WARNING: echec envoi digest (non bloquant).'"
