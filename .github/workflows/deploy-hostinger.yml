name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

env:
  HOSTINGER_HOST: 82.29.194.219
  HOSTINGER_PORT: 65002
  HOSTINGER_USER: u697417861
  HOSTINGER_APP_DIR: /home/u697417861/domains/thebestsarlworkspace.com/nodejs
  HOSTINGER_BUNDLE_DIR: /home/u697417861/domains/thebestsarlworkspace.com/.deploy
  PRISMA_SCHEMA_FILE: prisma/schema.mysql.prisma

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production app
        run: npm run build:mysql

      - name: Create deployment bundle
        run: |
          rm -rf .deploy
          mkdir -p .deploy/app
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env*' \
            --exclude='imports' \
            --exclude='coverage' \
            ./ .deploy/app/
          tar -czf .deploy/thebestsarl-hostinger.tar.gz -C .deploy/app .

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Upload bundle to Hostinger
        env:
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
          HOSTINGER_ENV: ${{ secrets.HOSTINGER_ENV }}
        run: |
          if [ -z "$HOSTINGER_PASSWORD" ]; then
            echo "[deploy] ERREUR: Secret GitHub HOSTINGER_PASSWORD manquant ou vide."
            echo "[deploy] Va dans Settings > Secrets and variables > Actions puis ajoute HOSTINGER_PASSWORD."
            exit 1
          fi
          sshpass -p "$HOSTINGER_PASSWORD" ssh -o StrictHostKeyChecking=no -p "$HOSTINGER_PORT" "$HOSTINGER_USER@$HOSTINGER_HOST" "mkdir -p '$HOSTINGER_BUNDLE_DIR' '$HOSTINGER_APP_DIR'"
          sshpass -p "$HOSTINGER_PASSWORD" scp -P "$HOSTINGER_PORT" -o StrictHostKeyChecking=no .deploy/thebestsarl-hostinger.tar.gz "$HOSTINGER_USER@$HOSTINGER_HOST:$HOSTINGER_BUNDLE_DIR/"
          # Ensure .env exists on server (HOSTINGER_ENV secret = full content of .env.hostinger)
          if [ -n "$HOSTINGER_ENV" ]; then
            echo "$HOSTINGER_ENV" | sshpass -p "$HOSTINGER_PASSWORD" ssh -o StrictHostKeyChecking=no -p "$HOSTINGER_PORT" "$HOSTINGER_USER@$HOSTINGER_HOST" "cat > '$HOSTINGER_APP_DIR/.env'"
          else
            echo "[deploy] INFO: Secret HOSTINGER_ENV absent, on conserve le .env déjà présent sur le serveur."
          fi

      - name: Extract bundle and restart app
        env:
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
        run: |
          if [ -z "$HOSTINGER_PASSWORD" ]; then
            echo "[deploy] ERREUR: Secret GitHub HOSTINGER_PASSWORD manquant ou vide."
            exit 1
          fi
          sshpass -p "$HOSTINGER_PASSWORD" ssh -o StrictHostKeyChecking=no -p "$HOSTINGER_PORT" "$HOSTINGER_USER@$HOSTINGER_HOST" '
            set -e
            APP_DIR="'$HOSTINGER_APP_DIR'"
            BUNDLE_DIR="'$HOSTINGER_BUNDLE_DIR'"
            BUNDLE="$BUNDLE_DIR/thebestsarl-hostinger.tar.gz"

            mkdir -p "$APP_DIR" "$BUNDLE_DIR"
            find "$APP_DIR" -mindepth 1 -maxdepth 1 ! -name tmp -exec rm -rf {} +
            tar -xzf "$BUNDLE" -C "$APP_DIR"
            cd "$APP_DIR"
            if ! command -v npm >/dev/null 2>&1; then
              echo "[deploy] ERREUR: npm introuvable dans cette session SSH. Configure Node.js sur Hostinger ou charge le PATH avant deploy."
              exit 1
            fi
            npm exec -- prisma db push --schema prisma/schema.mysql.prisma --accept-data-loss
            npm run db:ensure:password-setup-table
            npm run db:allow:pnr-duplicates
            npm run db:reset:airline-deposits

            # Charger DATABASE_URL : depuis .env persistant ou depuis environnement Hostinger (hPanel)
            if [ -f "$APP_DIR/.env" ]; then
              set -a && source "$APP_DIR/.env" && set +a
              echo "[deploy] Variables chargées depuis $APP_DIR/.env"
            elif [ -n "$DATABASE_URL" ]; then
              echo "[deploy] DATABASE_URL déjà disponible via environnement Hostinger"
            else
              echo "[deploy] ERREUR: DATABASE_URL introuvable (.env absent et non défini par hPanel)"
              exit 1
            fi

            npm run db:seed:attendance:random
            npm run db:send:unpaid-monthly-digest

            mkdir -p "$APP_DIR/tmp"
            touch "$APP_DIR/tmp/restart.txt" || true
          '
