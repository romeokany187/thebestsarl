name: Send Monthly Unpaid Digest

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: unpaid-monthly-digest
  cancel-in-progress: false

env:
  HOSTINGER_HOST: 82.29.194.219
  HOSTINGER_PORT: 65002
  HOSTINGER_USER: u697417861
  HOSTINGER_APP_DIR: /home/u697417861/domains/thebestsarlworkspace.com/nodejs

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Send digest from Hostinger
        env:
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
        run: |
          test -n "$HOSTINGER_PASSWORD"
          sshpass -p "$HOSTINGER_PASSWORD" ssh -o StrictHostKeyChecking=no -p "$HOSTINGER_PORT" "$HOSTINGER_USER@$HOSTINGER_HOST" '
            set -e
            APP_DIR="'$HOSTINGER_APP_DIR'"
            APP_PID="$(pgrep -fa "next start" | head -n1 | awk "{print \$1}")"
            if [[ -z "$APP_PID" ]]; then
              APP_PID="$(pgrep -fa "node" | head -n1 | awk "{print \$1}")"
            fi
            if [[ -z "$APP_PID" ]]; then
              echo "[digest] Impossible de trouver le processus applicatif Hostinger."
              exit 1
            fi

            ENV_FILE="$(mktemp)"
            tr '\''\0'\'' '\''\n'\'' < "/proc/$APP_PID/environ" | grep -E "^(DATABASE_URL|DIRECT_URL|PRISMA_DATABASE_URL|PRISMA_SCHEMA_FILE|SMTP_HOST|SMTP_PORT|SMTP_USER|SMTP_PASS|MAIL_FROM_EMAIL|MAIL_FROM_NAME|REPORTS_TO_EMAIL)=" > "$ENV_FILE"
            if ! grep -q '^DATABASE_URL=' "$ENV_FILE"; then
              echo "[digest] DATABASE_URL introuvable dans l'environnement du processus applicatif."
              cat "$ENV_FILE"
              rm -f "$ENV_FILE"
              exit 1
            fi

            cd "$APP_DIR"
            set -a
            source "$ENV_FILE"
            set +a
            npm run db:send:unpaid-monthly-digest
            rm -f "$ENV_FILE"
          '
