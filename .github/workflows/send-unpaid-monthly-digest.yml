name: Send Monthly Unpaid Digest

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: unpaid-monthly-digest
  cancel-in-progress: false

env:
  HOSTINGER_HOST: 82.29.194.219
  HOSTINGER_PORT: 65002
  HOSTINGER_USER: u697417861
  HOSTINGER_APP_DIR: /home/u697417861/domains/thebestsarlworkspace.com/nodejs

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Send digest from Hostinger
        env:
          HOSTINGER_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
        run: |
          if [ -z "$HOSTINGER_PASSWORD" ]; then
            echo "[digest] ERREUR: Secret GitHub HOSTINGER_PASSWORD manquant ou vide."
            echo "[digest] Va dans Settings > Secrets and variables > Actions puis ajoute HOSTINGER_PASSWORD."
            exit 1
          fi
          sshpass -p "$HOSTINGER_PASSWORD" ssh -o StrictHostKeyChecking=no -p "$HOSTINGER_PORT" "$HOSTINGER_USER@$HOSTINGER_HOST" '
            set -e
            APP_DIR="'$HOSTINGER_APP_DIR'"

            # Session SSH non interactive: reconstruire PATH pour retrouver node/npm
            for candidate in "$HOME/.nvm/versions/node"/*/bin \
              /opt/alt/alt-nodejs20/root/usr/bin \
              /opt/alt/alt-nodejs18/root/usr/bin \
              /opt/alt/alt-nodejs16/root/usr/bin \
              /usr/local/bin \
              /usr/bin; do
              if [ -d "$candidate" ]; then
                PATH="$candidate:$PATH"
              fi
            done
            export PATH

            if [ -s "$HOME/.nvm/nvm.sh" ]; then
              . "$HOME/.nvm/nvm.sh"
              nvm use --lts >/dev/null 2>&1 || true
            fi

            if ! command -v node >/dev/null 2>&1 && command -v nodejs >/dev/null 2>&1; then
              NODE_CMD="nodejs"
            else
              NODE_CMD="node"
            fi

            if ! command -v "$NODE_CMD" >/dev/null 2>&1; then
              echo "[digest] ERREUR: Node.js introuvable dans la session SSH Hostinger."
              exit 1
            fi

            if ! command -v npm >/dev/null 2>&1; then
              echo "[digest] ERREUR: npm introuvable dans la session SSH Hostinger."
              exit 1
            fi

            cd "$APP_DIR"
            if [ -f "$APP_DIR/.env" ]; then
              set -a && source "$APP_DIR/.env" && set +a
              echo "[digest] Variables chargées depuis $APP_DIR/.env"
            elif [ -n "$DATABASE_URL" ]; then
              echo "[digest] DATABASE_URL déjà disponible via environnement Hostinger"
            else
              echo "[digest] ERREUR: DATABASE_URL introuvable (.env absent et non défini par hPanel)"
              exit 1
            fi

            npm run db:send:unpaid-monthly-digest
          '
