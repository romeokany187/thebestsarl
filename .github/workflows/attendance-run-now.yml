name: Run Attendance Now

on:
  push:
    branches: [ main ]
    paths: [ '.github/workflows/attendance-run-now.yml' ]

jobs:
  run-now:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: |
          PRISMA_RESOLVED_SCHEMA=$(node scripts/resolve-prisma-schema.js)
          npx prisma generate --schema "$PRISMA_RESOLVED_SCHEMA"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run attendance seed (immediate)
        run: npx tsx scripts/seed-random-attendance.ts
        env:
          ATTENDANCE_USER_ID: cmnnqfi9e000j56dpzhewyj0k
          ATTENDANCE_START_DATE: '2026-05-16'
          ATTENDANCE_END_DATE: '2026-05-30'
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
